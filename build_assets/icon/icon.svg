<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="#0d1117"/>
  <rect x="10" y="10" width="492" height="492" rx="100" fill="none" stroke="#21262d" stroke-width="4"/>

  <!-- Receipt / card shape -->
  <rect x="146" y="108" width="220" height="296" rx="18" fill="#161b22" stroke="#2dd4bf" stroke-width="6"/>

  <!-- Receipt lines -->
  <line x1="176" y1="160" x2="336" y2="160" stroke="#2dd4bf" stroke-width="10" stroke-linecap="round"/>
  <line x1="176" y1="196" x2="300" y2="196" stroke="#3d444d" stroke-width="8" stroke-linecap="round"/>
  <line x1="176" y1="224" x2="320" y2="224" stroke="#3d444d" stroke-width="8" stroke-linecap="round"/>
  <line x1="176" y1="252" x2="280" y2="252" stroke="#3d444d" stroke-width="8" stroke-linecap="round"/>

  <!-- Divider -->
  <line x1="176" y1="288" x2="336" y2="288" stroke="#2dd4bf" stroke-width="4" stroke-dasharray="10,10" opacity="0.6"/>

  <!-- Total row -->
  <line x1="176" y1="322" x2="240" y2="322" stroke="#e6edf3" stroke-width="10" stroke-linecap="round"/>
  <line x1="270" y1="322" x2="336" y2="322" stroke="#2dd4bf" stroke-width="10" stroke-linecap="round"/>

  <!-- Cart icon badge, bottom-right overlapping the receipt -->
  <circle cx="358" cy="378" r="66" fill="#2dd4bf"/>
  <g transform="translate(324,346)" stroke="#052e27" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="20" cy="58" r="5" fill="#052e27"/>
    <circle cx="46" cy="58" r="5" fill="#052e27"/>
    <path d="M4 8h8l7 36h32l9-24H16"/>
  </g>
</svg>
